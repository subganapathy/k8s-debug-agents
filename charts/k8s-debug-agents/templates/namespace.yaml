{{/*
Creates the agent-system namespace and labels it for:
  - Istio sidecar injection (`istio-injection: enabled`)
  - Pod Security Admission enforcement (`pod-security.kubernetes.io/*`)

Why this is in the chart (and not just --create-namespace on helm install):
- --create-namespace doesn't set labels, so sidecar injection + PSA enforcement
  wouldn't apply without a second kubectl step.
- Making the namespace declarative + part of the chart is GitOps-friendly —
  ArgoCD / Flux can reconcile the labels if something drifts.
- Idempotent: Helm owns this resource; re-sync is a no-op when state matches.

PSA enforces a `restricted` profile. credential-authz already conforms;
future components (dispatcher, agent-task) must conform too. This is the
project's security baseline for this namespace and depends on istio-cni
being installed (eliminates the privileged istio-init container that would
otherwise violate restricted/baseline).
*/}}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    {{- include "k8s-debug-agents.labels" . | nindent 4 }}
    {{- if .Values.namespace.istioInjection }}
    istio-injection: enabled
    {{- end }}
    {{- with .Values.namespace.podSecurity.enforce }}
    pod-security.kubernetes.io/enforce: {{ . | quote }}
    {{- end }}
    {{- with .Values.namespace.podSecurity.enforceVersion }}
    pod-security.kubernetes.io/enforce-version: {{ . | quote }}
    {{- end }}
    {{- with .Values.namespace.podSecurity.audit }}
    pod-security.kubernetes.io/audit: {{ . | quote }}
    {{- end }}
    {{- with .Values.namespace.podSecurity.auditVersion }}
    pod-security.kubernetes.io/audit-version: {{ . | quote }}
    {{- end }}
    {{- with .Values.namespace.podSecurity.warn }}
    pod-security.kubernetes.io/warn: {{ . | quote }}
    {{- end }}
    {{- with .Values.namespace.podSecurity.warnVersion }}
    pod-security.kubernetes.io/warn-version: {{ . | quote }}
    {{- end }}
  {{- with .Values.global.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
