# Kind dev overrides.
# Used by: make app-install (default), make cluster-up.
#
# Purpose:
# - Smaller resource requests so 4-node Kind cluster fits on a laptop
# - Verbose-friendly settings where useful
# - Same `namespace.istioInjection: true` as prod (we want dev and prod to use
#   the mesh path identically)

namespace:
  name: agent-system
  istioInjection: true

images:
  # Empty registry means `kind load docker-image` loads the images directly.
  # The tag matches what `make build-images` produces in later steps.
  registry: ""
  pullPolicy: IfNotPresent
  tag: "0.1.0"

# Components: enable progressively as build steps land.
nodeAgent:
  enabled: false           # Step 6
dispatcher:
  enabled: false           # Step 4

# credentialAuthz: enabled (default in values.yaml). Kind-specific overrides:
# - 1 replica is enough on a single-machine Kind cluster (saves ~50m CPU)
# - debug logging by default; you'll want detailed traces while iterating
credentialAuthz:
  enabled: true
  replicas: 1
  logLevel: debug
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
