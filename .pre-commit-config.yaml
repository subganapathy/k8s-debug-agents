# Pre-commit hooks — Layer 2 of accidental-secret-checkin defense.
#
# Setup (one-time, per developer machine):
#   make install-pre-commit
#
# After setup, every `git commit` runs these hooks against staged changes.
# Gitleaks rejects the commit if it detects a secret pattern (Anthropic, OpenAI,
# AWS, GitHub, ~150 others).
#
# Layer 1 = .gitignore patterns
# Layer 2 = THIS file (gitleaks pre-commit)
# Layer 3 = GitHub push protection (server-side, configured in repo settings)
# Layer 4 = Anthropic dashboard spend cap (blast-radius reduction if leak still occurs)
# See README "Security guardrails" for the full setup.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        # Default: scans staged changes only (--staged). Fast, focused.
        # `make security-scan` runs `gitleaks detect` against the full working tree.

  # Generic hygiene — catches whitespace/EOL issues that leak into PRs and add noise.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-yaml
        # Helm templates have {{ }} actions that are not valid YAML — exclude them.
        exclude: ^charts/.*/templates/.*\.ya?ml$
