# A trivial pod used solely to verify that Istio sidecar injection works in
# the agent-tasks namespace. The `pause` image is the smallest possible
# container (~700KB), runs forever, does nothing — its container is always
# named after the pod, so we assert that kubectl sees exactly 2 containers
# (smoke-test + istio-proxy).
#
# securityContext satisfies the PSA `restricted` profile so this pod can be
# admitted in the agent-tasks namespace (which enforces `restricted`):
#   - runs as non-root (UID 65532, the well-known nonroot UID)
#   - drops ALL capabilities
#   - readOnlyRootFilesystem (pause writes nothing)
#   - allowPrivilegeEscalation=false
#   - RuntimeDefault seccomp profile
# These settings are minimum to pass `restricted`; not the smallest possible
# pod spec.
#
# This pod is deleted at the start of every smoke test (see setup.sh).

apiVersion: v1
kind: Pod
metadata:
  name: smoke-test
  namespace: agent-tasks
  labels:
    app: smoke-test
    purpose: sidecar-injection-verification
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: smoke-test
      image: registry.k8s.io/pause:3.10
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 32Mi
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
