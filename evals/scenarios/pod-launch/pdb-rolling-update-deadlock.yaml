# evals/scenarios/pod-launch/pdb-rolling-update-deadlock.yaml
#
# Scenario: PDB-induced rolling-update / scale-up deadlock.
#
# The classic deadlock pattern:
# - Deployment with N replicas + PDB minAvailable=N (zero eviction budget).
# - Cluster at capacity for the current replicas.
# - To scale up or roll out a new version, K8s would create a surge pod
#   (the (N+1)th pod). The surge pod cannot fit on any node. To free
#   room, the cluster would have to evict an existing replica — but the
#   PDB minAvailable=N (== currentHealthy) prevents the eviction.
# - Result: the rollout / scale-up is stuck. The new pod sits Pending
#   forever, the cluster has no path to make room.
#
# Faithfully reproducing a TRUE rolling update would require a Job to
# patch the Deployment after steady state — too much fixture machinery
# for the same diagnostic challenge. Instead we manifest the deadlock at
# initial deploy: 3 replicas where only 2 fit (each requests 7 CPU; both
# 10-core workers can hold one), with PDB minAvailable=3. The cluster
# state the agent observes is identical to a stuck rolling update
# mid-rollout:
#   - 2 pods Running, 1 stuck Pending with FailedScheduling
#   - PDB status.currentHealthy=2 < spec.minAvailable=3
#   - PDB status.disruptionsAllowed=0
#   - No path to recover without operator intervention.
#
# Surface symptom: "Insufficient cpu" on the Pending pod.
# Actual root cause: PDB minAvailable=3 EQUALS desired replicas, leaving
# zero eviction budget. Even if capacity is added today, the next rolling
# update will deadlock the same way unless the PDB shape is fixed.
#
# What the agent should diagnose: a chain — Pending due to Insufficient
# cpu → both schedulable workers are full of pods from the SAME
# Deployment → PDB app-pdb at minAvailable=3 prevents eviction-based
# recovery → this PDB shape (minAvailable == replicas) is structurally
# incompatible with rolling updates that need surge headroom.
# Remediation must reference fixing the PDB (minAvailable < replicas, or
# use maxUnavailable instead), not just "add CPU."

---
apiVersion: v1
kind: Namespace
metadata:
  name: eval-pdb-rolling-update-deadlock
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    eval-scenario: pdb-rolling-update-deadlock
    eval-purpose: pod-launch-pdb-rolling-update-deadlock-fixture
    app.kubernetes.io/managed-by: k8s-debug-agents-evals

---
# A 3-replica Deployment whose pods request 7 CPU each. Only two
# schedulable workers exist (debug-agent-worker, debug-agent-worker2,
# each ~10 cores allocatable). The third replica cannot fit anywhere:
# every remaining node has either an untolerated taint or only ~3 cores
# left after one app pod is placed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: eval-pdb-rolling-update-deadlock
  labels:
    eval-scenario: pdb-rolling-update-deadlock
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Standard rolling-update shape: one surge pod, one disruption
      # allowed at a time. With the PDB below at minAvailable=3, the
      # one disruption the strategy WOULD permit gets blocked anyway —
      # so the strategy fields don't save us. This is the point of the
      # scenario.
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
        eval-scenario: pdb-rolling-update-deadlock
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "7"
              memory: "50Mi"
            limits:
              cpu: "7"
              memory: "50Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

---
# PDB with minAvailable equal to the Deployment's replica count. This
# leaves zero eviction budget: once currentHealthy == minAvailable, any
# eviction request fails admission. Combined with capacity tightness,
# this creates the deadlock the agent must diagnose.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-pdb
  namespace: eval-pdb-rolling-update-deadlock
  labels:
    eval-scenario: pdb-rolling-update-deadlock
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: app
