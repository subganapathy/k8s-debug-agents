# evals/scenarios/pod-launch/taint-toleration-mismatch.yaml
#
# Scenario: pod is pinned to a tainted node via nodeSelector but doesn't
# tolerate the taint.
#
# Setup:
# - The Kind cluster has `debug-agent-worker3` with a `reserved=topology-test:
#   NoSchedule` taint (part of the cluster fixture setup, not this scenario).
# - This scenario creates a pod with `nodeSelector` pinning it to
#   `debug-agent-worker3` AND no toleration for the taint.
# - Result: every node is rejected — worker1/worker2 don't match the
#   nodeSelector, worker3 matches but has the untolerated taint, control-plane
#   has its own untolerated taint AND doesn't match nodeSelector.
# - The scheduler emits a FailedScheduling event with both "didn't match Pod's
#   node affinity/selector" AND "had untolerated taint" reasons.
#
# Surface symptom: pod Pending with FailedScheduling.
# Actual root cause: combination of (a) nodeSelector forcing worker3 + (b)
# missing toleration for worker3's taint.
#
# What the agent should diagnose: read the pod's `.spec.nodeSelector` and
# `.spec.tolerations` (the latter is empty), list nodes via kubectl_list
# kind=Node, observe that worker3 (the only node matching the selector) has
# `reserved=topology-test:NoSchedule`, and conclude the pod cannot schedule
# anywhere. Remediation options:
#   (a) Add a matching toleration to the pod spec
#       (key: reserved, operator: Equal, value: topology-test, effect: NoSchedule)
#   (b) Remove the nodeSelector so the pod can schedule on worker1/worker2
#   (c) Remove the taint from worker3 (if the taint is no longer needed)
# The agent's Findings must cite the specific taint key/value/effect AND
# offer the literal YAML for at least one remediation.

---
apiVersion: v1
kind: Namespace
metadata:
  name: eval-taint-toleration-mismatch
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    eval-scenario: taint-toleration-mismatch
    eval-purpose: pod-launch-taint-mismatch-fixture
    app.kubernetes.io/managed-by: k8s-debug-agents-evals

---
apiVersion: v1
kind: Pod
metadata:
  name: needs-worker3
  namespace: eval-taint-toleration-mismatch
  labels:
    eval-scenario: taint-toleration-mismatch
spec:
  # Pin to worker3 via nodeSelector. Worker3 has a NoSchedule taint
  # (`reserved=topology-test`) that this pod doesn't tolerate. The
  # combination produces a guaranteed unschedulable state.
  nodeSelector:
    kubernetes.io/hostname: debug-agent-worker3
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "100m"
          memory: "50Mi"
        limits:
          cpu: "100m"
          memory: "50Mi"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
