# evals/scenarios/pod-launch/insufficient-cpu.yaml
#
# Scenario: pod requests CPU larger than allocatable on any node.
# Expected K8s behavior: pod stuck in Pending with `FailedScheduling` event.
# What the agent should diagnose: "pod's CPU request exceeds node allocatable."
#
# Why this scenario is the simplest:
#   - Deterministic: pod will never schedule unless cluster has 100+ core nodes
#     (Kind nodes have a few cores; this is impossible by construction).
#   - Single failure mode: only `FailedScheduling` events, nothing else firing.
#   - K8s API surface alone is sufficient: no runtime evidence needed
#     (no node-agent, no container logs, no probe analysis).
#   - The fix is unambiguous: reduce CPU request or scale node pool.

---
apiVersion: v1
kind: Namespace
metadata:
  name: eval-insufficient-cpu
  labels:
    # PSA labels — this namespace enforces restricted profile, same as agent-tasks.
    # The scenario pod below must satisfy restricted (runAsNonRoot, drop ALL caps,
    # seccompProfile, etc.) or it would be rejected at admission AND we'd be
    # testing the wrong failure mode.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    # Discoverability — `kubectl get ns -l eval-purpose=...` finds these.
    eval-scenario: insufficient-cpu
    eval-purpose: pod-launch-diagnostic-fixture
    app.kubernetes.io/managed-by: k8s-debug-agents-evals

---
apiVersion: v1
kind: Pod
metadata:
  name: needs-massive-cpu
  namespace: eval-insufficient-cpu
  labels:
    eval-scenario: insufficient-cpu
    app.kubernetes.io/managed-by: k8s-debug-agents-evals
spec:
  # No nodeSelector, no taints/tolerations, no priorityClass — a vanilla pod
  # with an impossible CPU request. The scheduler will emit FailedScheduling
  # repeatedly; the pod will stay in Pending indefinitely.
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "100"        # 100 cores — no Kind node has this many
          memory: "100Mi"
        limits:
          cpu: "100"
          memory: "100Mi"
      securityContext:
        # PSA restricted demands all of these.
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
