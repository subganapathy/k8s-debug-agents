# evals/scenarios/pod-launch/quota-exceeded.yaml
#
# Scenario: Namespace has a tight ResourceQuota. A Deployment tries to create
# pods whose aggregate CPU request exceeds the quota.
#
# Expected K8s behavior: API server's admission BLOCKS pod creation. NO pods
# exist. ReplicaSet emits FailedCreate events with "exceeded quota" message.
# Deployment shows desired=3, current=0, available=0.
#
# What the agent should diagnose: "ResourceQuota X in namespace Y blocks pod
# creation; aggregate requests would exceed limit." Suggest reducing per-pod
# CPU, reducing replicas, or raising the quota.
#
# Why this scenario matters: this is the canonical case where the agent's
# kubectl_get_pod returns NotFound — there's no pod to investigate. The agent
# must look at the OWNING controller's (ReplicaSet) events, not pod events.
# Without `kubectl_get_events_for_object` accepting kind=ReplicaSet, the
# agent has no way to see the rejection.

---
apiVersion: v1
kind: Namespace
metadata:
  name: eval-quota-exceeded
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    eval-scenario: quota-exceeded
    eval-purpose: pod-launch-admission-rejected-fixture
    app.kubernetes.io/managed-by: k8s-debug-agents-evals

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: tight-quota
  namespace: eval-quota-exceeded
  labels:
    eval-scenario: quota-exceeded
spec:
  hard:
    # 100m total CPU for the whole namespace. The Deployment below requests
    # 200m per pod × 3 replicas = 600m, way over.
    requests.cpu: "100m"
    limits.cpu: "200m"
    requests.memory: "200Mi"
    limits.memory: "200Mi"
    pods: "5"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: needs-room
  namespace: eval-quota-exceeded
  labels:
    eval-scenario: quota-exceeded
    app.kubernetes.io/managed-by: k8s-debug-agents-evals
spec:
  replicas: 3
  selector:
    matchLabels:
      app: needs-room
  template:
    metadata:
      labels:
        app: needs-room
        eval-scenario: quota-exceeded
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "200m"           # 200m × 3 = 600m, > 100m quota = REJECTED
              memory: "50Mi"
            limits:
              cpu: "200m"
              memory: "50Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
