# evals/scenarios/pod-launch/pdb-blocks-scaling.yaml
#
# Scenario: PDB-induced scheduling pressure.
#
# Setup:
# - 2 "hog" pods (Deployment with anti-affinity), each requesting 7 cores,
#   spread one per worker node (debug-agent-worker, debug-agent-worker2 —
#   each ~10 cores allocatable).
# - PodDisruptionBudget on the hog deployment with minAvailable=2 (the
#   current replica count). This means ZERO disruption budget — the
#   cluster cannot temporarily evict either hog pod to make room.
# - A separate Pod `another-app` requesting 6 cores. Cannot fit on either
#   worker (each has ~3 cores left after the hog). Stays Pending with
#   "Insufficient cpu" event.
#
# Surface symptom: "Insufficient cpu" on the Pending pod.
# Actual root cause: the workers are full of PDB-protected pods that can't
# be evicted. The fix isn't just "increase CPU" — it's structural (weaken
# the PDB, scale down the hog, or add cluster capacity).
#
# What the agent should diagnose: a chain — Pending due to insufficient
# cpu → both workers full → consumed by the `hog` Deployment's pods →
# protected by `hog-pdb` at minAvailable=2 (= currentHealthy, no eviction
# headroom). Remediation must reference the PDB, not just "reduce CPU."
#
# Note on ordering: the hogs get a high-priority PriorityClass so the
# scheduler places them BEFORE another-app (which uses default priority).
# Without this, race conditions can let another-app grab a worker first
# and the fixture state becomes unreliable.

---
# Cluster-scoped PriorityClass to ensure deterministic scheduling order
# in the fixture. The hogs use this so they're picked up first; the
# Pending another-app uses default priority (0).
# This PriorityClass is cluster-scoped and persists across scenario
# applies/cleans — that's fine, it's idempotent and named-scoped.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: pdb-blocks-scaling-hog
value: 1000
preemptionPolicy: Never
description: >-
  Used by hog pods in the pdb-blocks-scaling eval fixture to ensure they
  schedule before the test's other pod (eliminates a race condition that
  would otherwise leave the fixture in the wrong state).

---
apiVersion: v1
kind: Namespace
metadata:
  name: eval-pdb-blocks-scaling
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    eval-scenario: pdb-blocks-scaling
    eval-purpose: pod-launch-pdb-induced-pressure-fixture
    app.kubernetes.io/managed-by: k8s-debug-agents-evals

---
# The "hog" Deployment — consumes most of each worker's capacity.
# Anti-affinity ensures one pod per worker (so both workers are full).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hog
  namespace: eval-pdb-blocks-scaling
  labels:
    eval-scenario: pdb-blocks-scaling
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hog
  template:
    metadata:
      labels:
        app: hog
        eval-scenario: pdb-blocks-scaling
    spec:
      priorityClassName: pdb-blocks-scaling-hog  # scheduled before another-app
      # Anti-affinity: pods of the same app must NOT share a node.
      # Forces one hog per worker.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: hog
              topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "7"               # 7 cores; nearly fills a 10-core worker
              memory: "50Mi"
            limits:
              cpu: "7"
              memory: "50Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

---
# PDB protecting the hog Deployment. minAvailable=2 means the cluster
# cannot evict either replica (since current healthy = 2). Any
# eviction request fails admission.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hog-pdb
  namespace: eval-pdb-blocks-scaling
  labels:
    eval-scenario: pdb-blocks-scaling
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: hog

---
# The Pending pod the user diagnoses. Wants 6 cores; each worker has
# ~3 cores left after the hog. Stays Pending with "Insufficient cpu".
apiVersion: v1
kind: Pod
metadata:
  name: another-app
  namespace: eval-pdb-blocks-scaling
  labels:
    eval-scenario: pdb-blocks-scaling
spec:
  containers:
    - name: app
      image: busybox:1.36
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: "6"
          memory: "50Mi"
        limits:
          cpu: "6"
          memory: "50Mi"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
